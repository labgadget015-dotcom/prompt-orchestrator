name: CI

on:
  push:
    branches:
      - main
      - "phase*/**"
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 orchestrator/ --max-line-length=120 --extend-ignore=E203,W503

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lightweight dependencies
        run: pip install requests pytest pytest-cov

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(find tests -name '*.py' ! -name '__init__.py' | head -1)" ]; then
            IGNORE_FLAG=""
            if [ -d "tests/integration" ]; then
              IGNORE_FLAG="--ignore=tests/integration"
            fi
            pytest tests/ -v --cov=orchestrator --cov-report=term-missing $IGNORE_FLAG || true
          else
            echo "No tests found — skipping"
          fi
